<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Birthday Card ✨</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow-x:hidden;
  font-family:'Trebuchet MS',sans-serif;

  background:
  linear-gradient(135deg,#1f1c2c,#928dab);

  display:flex;
  justify-content:center;
  align-items:center;

  position:relative;

  padding:40px 0;
}

/* stars */

.stars{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:0;
}

.star{
  position:absolute;
  width:3px;
  height:3px;
  border-radius:50%;
  background:white;
  animation:twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{
  0%,100%{
    opacity:0.2;
  }

  50%{
    opacity:1;
  }
}

/* sakura petals */

.petal{
  position:fixed;
  top:-50px;
  color:#ffb6d9;
  pointer-events:none;
  animation:fall linear infinite;
  z-index:0;
}

@keyframes fall{

  0%{
    transform:
    translateY(-100px)
    rotate(0deg);
    opacity:1;
  }

  100%{
    transform:
    translateY(110vh)
    rotate(360deg);

    opacity:0;
  }
}

/* wrapper */

.wrapper{
  width:100%;
  max-width:390px;

  padding:20px;

  position:relative;
  z-index:5;

  display:flex;
  flex-direction:column;
  align-items:center;

  gap:28px;
}

/* envelope */

.envelope{

  width:100%;

  aspect-ratio:3/2.4;

  background:
  rgba(255,255,255,0.08);

  backdrop-filter:blur(12px);

  border:
  1px solid rgba(255,255,255,0.15);

  border-radius:22px;

  position:relative;

  display:flex;
  justify-content:center;
  align-items:center;

  overflow:visible;

  cursor:pointer;

  box-shadow:
  0 10px 35px rgba(0,0,0,0.2);
}

/* flap */

.flap{
  position:absolute;

  width:100%;
  height:50%;

  top:0;
  left:0;

  background:
  linear-gradient(
    135deg,
    #ffb3c6,
    #ffd6e0
  );

  clip-path:
  polygon(
    0 0,
    100% 0,
    50% 100%
  );

  transform-origin:top;

  transition:1s ease;

  border-top-left-radius:22px;
  border-top-right-radius:22px;

  z-index:3;
}

/* front text */

.message{

  position:absolute;

  top:68%;
  left:50%;

  transform:
  translate(-50%,-50%);

  width:90%;

  text-align:center;

  color:white;

  font-size:18px;
  font-weight:bold;

  text-shadow:
  0 0 10px rgba(255,255,255,0.6);

  transition:0.4s ease;
}

.open .message{
  opacity:0;
}

/* letter */

.letter{

  position:absolute;

  width:92%;

  background:
  rgba(255,255,255,0.95);

  border-radius:20px;

  padding:16px;

  top:50%;
  left:50%;

  transform:
  translate(-50%,60%);

  opacity:0;

  transition:1s ease;

  box-shadow:
  0 12px 35px rgba(0,0,0,0.25);
}

.open .letter{

  transform:
  translate(-50%,-42%);

  opacity:1;
}

/* flap open */

.open .flap{
  transform:rotateX(-180deg);
  z-index:0;
}

/* collage */

.collage{

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  grid-auto-rows:105px;

  gap:12px;

  width:100%;
}

.collage img,
.center{

  width:100%;
  height:100%;

  border-radius:16px;
}

/* images */

.collage img{

  object-fit:cover;

  cursor:pointer;

  border:
  2px solid rgba(255,255,255,0.6);

  transition:
  transform 0.3s ease,
  box-shadow 0.3s ease;
}

.collage img:hover{

  transform:
  scale(1.04);

  box-shadow:
  0 8px 20px rgba(0,0,0,0.2);
}

/* center text */

.center{

  background:
  linear-gradient(
    135deg,
    #ffe0f5,
    #e9d5ff
  );

  display:flex;
  justify-content:center;
  align-items:center;

  text-align:center;

  color:#ff4f93;

  font-size:13px;
  font-weight:bold;

  line-height:1.4;

  padding:10px;
}

/* popup */

.popup{

  position:fixed;

  inset:0;

  background:
  rgba(0,0,0,0.75);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:100;
}

/* popup card */

.popup-card{

  width:85%;
  max-width:320px;

  background:white;

  border-radius:20px;

  padding:14px;

  animation:popupIn 0.35s ease;
}

@keyframes popupIn{

  from{
    transform:scale(0.7);
    opacity:0;
  }

  to{
    transform:scale(1);
    opacity:1;
  }
}

.popup-card img{

  width:100%;
  border-radius:14px;
}

.caption{

  margin-top:10px;

  text-align:center;

  color:#555;

  font-size:15px;

  line-height:1.4;
}

/* note box */

.note-box{

  width:90%;
  max-width:390px;

  background:
  rgba(255,255,255,0.12);

  backdrop-filter:blur(12px);

  border:
  1px solid rgba(255,255,255,0.15);

  border-radius:20px;

  padding:20px;

  text-align:center;

  color:white;

  font-size:15px;

  line-height:1.6;

  box-shadow:
  0 8px 25px rgba(0,0,0,0.15);

  opacity:0;

  transform:
  translateY(20px);

  transition:0.7s ease;
}

.note-box.show{

  opacity:1;

  transform:
  translateY(0);
}

/* canvas */

canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
}

/* mobile */

@media(max-width:420px){

  .message{
    font-size:16px;
  }

  .center{
    font-size:11px;
  }

  .collage{
    grid-auto-rows:92px;
  }
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="wrapper">

  <div class="envelope" onclick="openEnvelope()">

    <div class="flap"></div>

    <div class="message">
      ✨ Happy Birthday Senpai ✨<br>
      Tap to Open
    </div>

    <div class="letter">

      <div class="collage">

        <img src="photos/Alisha_1.jpeg"
        onclick="showPopup(this,'Cutu photo found')">

        <img src="photos/Alisha_2.jpeg"
        onclick="showPopup(this,'Full gang hangout⚔️')">

        <img src="photos/Alisha_3.jpeg"
        onclick="showPopup(this,'Certified cutie baddie 🐢')">

        <img src="photos/Alisha_4.jpeg"
        onclick="showPopup(this,'POV: slice of life episode 🌸')">

        <div class="center">
          ✨ Happy Birthday Cutie✨<br>
          
        </div>

        <img src="photos/Alisha_5.jpeg"
        onclick="showPopup(this,'Absolutely adorable🫶🏻')">

        <img src="photos/Alisha_6.jpeg"
        onclick="showPopup(this,'Pre new year dinner hangout')">

        <img src="photos/Alisha_7.jpeg"
        onclick="showPopup(this,'Soo cute yaarrr')">

        <img src="photos/Alisha_8.jpeg"
        onclick="showPopup(this,'🥹🥹🥹')">

      </div>

    </div>

  </div>

  <!-- note box -->

  <div class="note-box" id="noteBox"></div>

</div>

<!-- popup -->

<div class="popup" id="popup" onclick="closePopup()">

  <div class="popup-card">

    <img id="popupImg">

    <div class="caption" id="caption"></div>

  </div>

</div>

<canvas id="confetti"></canvas>

<script>

/* stars */

const starsContainer =
document.querySelector('.stars');

for(let i=0;i<80;i++){

  const star =
  document.createElement('div');

  star.classList.add('star');

  star.style.top =
  Math.random()*100+'%';

  star.style.left =
  Math.random()*100+'%';

  star.style.animationDelay =
  Math.random()*3+'s';

  starsContainer.appendChild(star);
}

/* petals */

for(let i=0;i<18;i++){

  const petal =
  document.createElement('div');

  petal.classList.add('petal');

  petal.innerHTML='🌸';

  petal.style.left =
  Math.random()*100+'vw';

  petal.style.fontSize =
  (14+Math.random()*16)+'px';

  petal.style.animationDuration =
  (6+Math.random()*6)+'s';

  document.body.appendChild(petal);
}

/* note */

const noteText =
"HAPPY BIRTHDAY TO ONE OF THE MOST CREATIVE PERSON!!! Alisha, kisi ko cutie and a baddie same tie banna rahe toh tumse seekhe🥹.Hope your story keeps getting better every season ✨🎌";

let typed=false;

/* open envelope */

function openEnvelope(){

  const env =
  document.querySelector('.envelope');

  if(!env.classList.contains('open')){

    env.classList.add('open');

    startConfetti();

    setTimeout(()=>{

      document
      .getElementById('noteBox')
      .classList.add('show');

      typeText();

    },1200);
  }
}

/* typing */

function typeText(){

  if(typed) return;

  typed=true;

  const note =
  document.getElementById('noteBox');

  let i=0;

  function typing(){

    if(i<noteText.length){

      note.innerHTML +=
      noteText.charAt(i);

      i++;

      setTimeout(typing,35);
    }
  }

  typing();
}

/* popup */

function showPopup(img,text){

  document
  .getElementById('popup')
  .style.display='flex';

  document
  .getElementById('popupImg')
  .src=img.src;

  document
  .getElementById('caption')
  .innerText=text;
}

function closePopup(){

  document
  .getElementById('popup')
  .style.display='none';
}

/* confetti */

const canvas =
document.getElementById('confetti');

const ctx =
canvas.getContext('2d');

canvas.width=
window.innerWidth;

canvas.height=
window.innerHeight;

let confetti=[],
animationId;

function startConfetti(){

  confetti=[];

  for(let i=0;i<120;i++){

    confetti.push({

      x:Math.random()*canvas.width,

      y:Math.random()*-canvas.height,

      r:Math.random()*6+2,

      d:Math.random()*50
    });
  }

  draw();

  setTimeout(()=>{

    cancelAnimationFrame(animationId);

    ctx.clearRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

  },5000);
}

function draw(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.fillStyle="#fff";

  ctx.beginPath();

  confetti.forEach(c=>{

    ctx.moveTo(c.x,c.y);

    ctx.arc(
      c.x,
      c.y,
      c.r,
      0,
      Math.PI*2
    );
  });

  ctx.fill();

  confetti.forEach(c=>{

    c.y += Math.cos(c.d)+1.5;

    c.x += Math.sin(c.d);

    if(c.y > canvas.height){

      c.y=-10;

      c.x=Math.random()*canvas.width;
    }
  });

  animationId=
  requestAnimationFrame(draw);
}

</script>

</body>
</html>
